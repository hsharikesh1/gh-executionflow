name: Matrix Demo
on: push
jobs:
    build:
     continue-on-error: true
     strategy:
        matrix:
          node-version: [14, 16, 18, 20, 22, 24]
          operating-system: [ubuntu-latest, windows-latest, macos-latest]
          include: 
            - node-version: 14
              operating-system: ubuntu-latest
            - node-version: 16
              operating-system: windows-latest
            - node-version: 18
              operating-system: macos-latest
            - node-version: 20
              operating-system: ubuntu-latest
            - node-version: 24
              operating-system: ubuntu-latest
          exclude:
            - node-version: 14
              operating-system: windows-latest
            - node-version: 16
              operating-system: macos-latest
            - node-version: 18
              operating-system: ubuntu-latest
            - node-version: 20
              operating-system: windows-latest
            - node-version: 24
              operating-system: macos-latest
     runs-on: ${{ matrix.operating-system }}
     steps:
        - name: Get Code
          uses : actions/checkout@v4
        - name: Install NodeJS
          uses: actions/setup-node@v4
          with:
            node-version: ${{ matrix.node-version }}
        - name: Install punnycode
          run: npm install punycode
        - name: Install dependencies
          run: npm ci
        - name: Build Project
          run: npm run build